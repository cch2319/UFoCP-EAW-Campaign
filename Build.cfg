			<Directory FilePattern="*" Recurse="true">Data\Scripts\FreeStore</Directory>
			<Directory FilePattern="*" Recurse="true">Data\Scripts\GameObject</Directory>
			<Directory FilePattern="*" Recurse="true">Data\Scripts\Library</Directory>
			<Directory FilePattern="*" Recurse="true">Data\Scripts\Miscellaneous</Directory>
			<Directory FilePattern="*" Recurse="true">Data\Scripts\Story</Directory>
			<Directory FilePattern="*" Recurse="true">Data\XML</Directory>
		</Bundle>
	</BuildSettings>
</ModBuildConfig>
