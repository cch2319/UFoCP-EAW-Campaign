			<Directory FilePattern="*" Recurse="true">Data\Art\Models</Directory>
			<Directory FilePattern="*" Recurse="true">Data\Art\Shaders</Directory>
			<Directory FilePattern="*" Recurse="false">Data\Art\Textures</Directory>
