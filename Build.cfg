<ModBuildConfig>
	<ModSettings Name="UFCP" Version="2.0.0.XXXX" ReleaseType="Full" />

	<BuildSettings>
		<Bundle Name="UFCP_Art">
			<Directory FilePattern="*" Recurse="true">Data\Art\Models</Directory>
			<Directory FilePattern="*" Recurse="true">Data\Art\Shaders</Directory>
			<Directory FilePattern="*" Recurse="false">Data\Art\Textures</Directory>
		</Bundle>

		<Bundle Name="UFCP_Maps">
			<Directory FilePattern="*" Recurse="true">Data\Art\Maps</Directory>
		</Bundle>

		<Bundle Name="UFCP_Scripts">
			<Directory FilePattern="*" Recurse="true">Data\Scripts</Directory>
			<Directory FilePattern="*" Recurse="true">Data\XML</Directory>
		</Bundle>
	</BuildSettings>
</ModBuildConfig>
